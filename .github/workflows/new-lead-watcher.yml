name: New Lead Watcher
on:
  schedule:
    - cron: '0 12-22 * * 1-5' # union of EDT (12-21) and EST (13-22); tz-gate filters to 8 AM–5 PM ET
  workflow_dispatch: {} # manual trigger for testing

concurrency:
  group: lead-watcher
  cancel-in-progress: false

jobs:
  tz-gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/New_York date +%-H)
          if [ "$HOUR" -ge 8 ] && [ "$HOUR" -le 17 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  run:
    needs: [tz-gate]
    if: needs.tz-gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx tsx scripts/check-new-leads.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GHL_PIT_TOKEN: ${{ secrets.GHL_PIT_TOKEN }}
