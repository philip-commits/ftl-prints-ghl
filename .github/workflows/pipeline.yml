name: Daily Pipeline
on:
  schedule:
    - cron: '0 11 * * 1-5' # 7 AM EDT
    - cron: '0 12 * * 1-5' # 7 AM EST
  workflow_dispatch: {} # manual trigger button in GitHub UI

jobs:
  tz-gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        env:
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Gate on which cron fired (github.event.schedule), not wall-clock — so GitHub's
          # cron-dispatch delay can't push us out of the window and skip the run.
          # EDT (-0400): 7 AM ET is 11 UTC. EST (-0500): 7 AM ET is 12 UTC.
          OFFSET=$(TZ=America/New_York date +%z)
          if { [ "$OFFSET" = "-0400" ] && [ "$SCHEDULE" = "0 11 * * 1-5" ]; } || \
             { [ "$OFFSET" = "-0500" ] && [ "$SCHEDULE" = "0 12 * * 1-5" ]; }; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

  run:
    needs: [tz-gate]
    if: needs.tz-gate.outputs.run == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - run: npx tsx scripts/run-pipeline.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          GHL_PIT_TOKEN: ${{ secrets.GHL_PIT_TOKEN }}

      - name: Alert Slack on failure
        if: failure()
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"🚨 FTL Daily Pipeline failed — recommendations did not generate. Dashboard is keeping last-good data. <https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}|View run>\"}"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
